<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ランダム画像ギャラリー</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#222;
    color:#fff;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.gallery{
    max-width:1000px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:12px;
    cursor:pointer;
}

.card img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;

    filter:brightness(0%);
    transition:0.35s;
}

.card:hover img{
    transform:scale(1.05);
}

.cover{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(100,100,100,.35);

    color:white;
    font-size:72px;
    font-weight:bold;

    transition:.35s;
}

.card.revealed img{
    filter:none;
}

.card.revealed .cover{
    opacity:0;
    pointer-events:none;
}

/* モーダル */

.modal{

    position:fixed;
    inset:0;

    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.9);

    z-index:1000;

}

.modal img{

    max-width:90%;
    max-height:90%;
    border-radius:12px;

}

.close{

    position:absolute;
    top:20px;
    right:30px;

    color:white;
    font-size:50px;

    cursor:pointer;

}

@media(max-width:700px){

.gallery{
    grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:450px){

.gallery{
    grid-template-columns:1fr;
}

}

</style>

</head>
<body>

<h1>画像ギャラリー</h1>

<div class="gallery">

<div class="card"><img><div class="cover">?</div></div>
<div class="card"><img><div class="cover">?</div></div>
<div class="card"><img><div class="cover">?</div></div>

<div class="card"><img><div class="cover">?</div></div>
<div class="card"><img><div class="cover">?</div></div>
<div class="card"><img><div class="cover">?</div></div>

<div class="card"><img><div class="cover">?</div></div>
<div class="card"><img><div class="cover">?</div></div>
<div class="card"><img><div class="cover">?</div></div>

</div>

<div class="modal" id="modal">

<span class="close">&times;</span>

<img id="modalImage">

</div>

<script>

// 使用する画像
const imageList=[
    "image1.png",
    "image2.png"
];

// モーダル
const modal=document.getElementById("modal");
const modalImage=document.getElementById("modalImage");

// ランダム配置
document.querySelectorAll(".card img").forEach(img=>{

    const random=imageList[Math.floor(Math.random()*imageList.length)];

    img.src=random;

});

// カード処理
document.querySelectorAll(".card").forEach(card=>{

    const img=card.querySelector("img");

    card.addEventListener("click",()=>{

        // まだ公開していない
        if(!card.classList.contains("revealed")){

            card.classList.add("revealed");
            return;

        }

        // 公開済みなら拡大
        modal.style.display="flex";
        modalImage.src=img.src;

    });

});

// ×ボタン
document.querySelector(".close").onclick=()=>{

    modal.style.display="none";

};

// 背景クリック
modal.onclick=(e)=>{

    if(e.target===modal){

        modal.style.display="none";

    }

};

// ESCキー
document.addEventListener("keydown",(e)=>{

    if(e.key==="Escape"){

        modal.style.display="none";

    }

});

</script>

</body>
</html>
